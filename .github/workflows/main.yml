name: Playwright Tests & Deploy
on:
  # push:
  #  branches: [ master ]
  workflow_dispatch: # allows manual trigger

jobs:
  test-and-deploy:
    runs-on: windows-latest
    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Fix Playwright permissions
      - name: Fix Playwright permissions
        run: chmod +x node_modules/.bin/playwright

      # ✅ Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: "C:\\Users\\runneradmin\\AppData\\Local\\ms-playwright"
          key: playwright-windows-${{ hashFiles('package-lock.json') }}

      # 5️⃣ Install Playwright browsers (Chromium only)
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # 6️⃣ Run Playwright tests
      - name: Run Playwright Tests
        run: npx playwright test tests/feeds tests/productcatalog tests/profile tests/publish/emailcampaign tests/publish/shoponbio tests/moderation tests/login tests/dashboard tests/autopilot
        env:
          ENV: live                   # ✅ moved here, under env (not inside run)
        continue-on-error: true

      # 7️⃣ Deploy to Netlify
      - name: Deploy to Netlify
        run: npx netlify deploy --prod --dir=playwright-report --message "Test Deploy"
        env:
          NETLIFY_AUTH_TOKEN: nfp_AQZQLQ4RZXMmTz4U6c8aTVLcqaHUfZrB8079