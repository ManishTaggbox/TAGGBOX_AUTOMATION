<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instagram Test Runner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #e1306c;
    --accent2: #f77737;
    --accent3: #833ab4;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --success: #00d084;
    --fail: #ff4757;
    --warn: #ffa502;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow-x: hidden;
  }

  /* ── Animated gradient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 10% -10%, #833ab420 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, #e1306c18 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, #f7773708 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: relative;
    z-index: 1;
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 0 30px #e1306c30;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header h1 span {
    background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .server-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .dot.offline { background: var(--fail); }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 89px);
    overflow: hidden;
  }

  /* ── Test list panel ── */
  .panel-tests {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .test-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .test-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent3), var(--accent));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .test-card:hover {
    border-color: #3a3a55;
    background: #1c1c28;
    transform: translateX(2px);
  }

  .test-card:hover::before { opacity: 1; }

  .test-card.active {
    border-color: var(--accent);
    background: #1e1018;
  }
  .test-card.active::before { opacity: 1; }

  .test-card.running { border-color: var(--accent2); animation: pulse-border 1s infinite; }
  .test-card.passed { border-color: var(--success); }
  .test-card.failed { border-color: var(--fail); }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--accent2); }
    50% { border-color: #7a3a10; }
  }

  .test-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }

  .test-info { flex: 1; min-width: 0; }

  .test-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .test-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .test-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .badge-idle { background: #1f1f2e; color: var(--muted); }
  .badge-running { background: #2a1800; color: var(--accent2); animation: blink 1s infinite; }
  .badge-passed { background: #001f14; color: var(--success); }
  .badge-failed { background: #1f0008; color: var(--fail); }
  .badge-skipped { background: #1f1a00; color: var(--warn); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .run-all-btn {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border: none;
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .run-all-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .run-all-btn:active { transform: translateY(0); }
  .run-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Output panel ── */
  .panel-output {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .output-title {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  .terminal {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    background: #08080d;
  }

  .terminal-placeholder {
    color: var(--muted);
    text-align: center;
    padding-top: 80px;
    font-size: 14px;
    line-height: 2;
  }
  .terminal-placeholder .big { font-size: 48px; display: block; margin-bottom: 12px; }

  .line { display: block; white-space: pre-wrap; word-break: break-all; }
  .line-pass { color: var(--success); }
  .line-fail { color: var(--fail); }
  .line-warn { color: var(--warn); }
  .line-info { color: #7cacf8; }
  .line-dim  { color: var(--muted); }
  .line-bold { color: var(--text); font-weight: 600; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Group headers ── */
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 4px;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .group-header:first-child { margin-top: 0; }

  .run-group-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .run-group-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Stats bar ── */
  .stats-bar {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 24px;
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-val { font-weight: 700; }
  .stat-pass { color: var(--success); }
  .stat-fail { color: var(--fail); }
  .stat-run  { color: var(--accent2); }

</style>
</head>
<body>

<header>
  <div class="logo">🧪</div>
  <div>
    <h1><span>Feeds</span> Test Runner</h1>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;">Playwright · Local UI · 57 Tests</div>
  </div>
  <div class="server-status">
    <div class="dot" id="dot"></div>
    <span id="server-label">Checking server…</span>
  </div>
</header>

<main>
  <!-- Left: Test list -->
  <aside class="panel-tests">
    <div class="panel-label">Test Suites</div>

    <button class="run-all-btn" id="run-all-btn" onclick="runAll()">▶ Run All Tests</button>

    <div id="test-list"></div>
  </aside>

  <!-- Right: Output -->
  <section class="panel-output">
    <div class="output-header">
      <span class="output-title" id="output-title">Terminal Output</span>
      <button class="clear-btn" onclick="clearOutput()">Clear</button>
    </div>
    <div class="terminal" id="terminal">
      <div class="terminal-placeholder">
        <span class="big">🎯</span>
        Click a test on the left to run it.<br/>
        <span style="color:var(--muted);font-size:12px;">Make sure <code style="color:var(--accent2)">node run-tests.js</code> is running in your project folder.</span>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat"><span style="color:var(--muted)">PASSED</span><span class="stat-val stat-pass" id="st-pass">0</span></div>
      <div class="stat"><span style="color:var(--muted)">FAILED</span><span class="stat-val stat-fail" id="st-fail">0</span></div>
      <div class="stat"><span style="color:var(--muted)">RUNNING</span><span class="stat-val stat-run" id="st-run">0</span></div>
      <div class="stat" style="margin-left:auto;color:var(--muted)" id="st-time"></div>
    </div>
  </section>
</main>

<script>
const SERVER = 'http://localhost:3333';

// ─── Test definitions ────────────────────────────────────────────────────────
const TESTS = [
  // ── Instagram ──────────────────────────────────────────────────────
  { id: 'ig_hashtag',        group: 'Instagram',  name: 'HashTag',              icon: '#️⃣', tag: '@InstagramHashTag Create Feed' },

  { id: 'ig_handle',         group: 'Instagram',  name: 'Handle',               icon: '🔗', tag: '@InstagramHandle Create Feed' },
  { id: 'ig_stories',        group: 'Instagram',  name: 'Stories',              icon: '📖', tag: '@InstagramStories Create Feed' },
  { id: 'ig_taggedinsta',    group: 'Instagram',  name: 'Tagged (Insta Login)', icon: '🏷️', tag: '@InstagramTaggedInstaLogin Create Feed' },
  { id: 'ig_taggedfb',       group: 'Instagram',  name: 'Tagged (FB Login)',    icon: '📘', tag: '@InstagramTaggedFBLogin Create Feed' },
  { id: 'ig_reels',          group: 'Instagram',  name: 'Reels',                icon: '🎬', tag: '@InstagramReels Create Feed' },
  { id: 'ig_onlyreels',      group: 'Instagram',  name: 'Only Reels',           icon: '🎥', tag: '@InstagramOnlyReels Create Feed' },
  // ── Airbnb ─────────────────────────────────────────────────────────
  { id: 'airbnb',            group: 'Airbnb',     name: 'Rooms',                icon: '🏠', tag: '@AirnbRooms create Feed' },
  // ── AliExpress ─────────────────────────────────────────────────────
  { id: 'aliexpress',        group: 'AliExpress', name: 'Reviews URL',          icon: '🛒', tag: '@aliexpressReviewsUrl  Create Feed' },
  // ── Amazon ─────────────────────────────────────────────────────────
  { id: 'amazon',            group: 'Amazon',     name: 'Product URL',          icon: '📦', tag: '@AmazonProductURL Create Feed' },
  // ── Booking.com ────────────────────────────────────────────────────
  { id: 'bookingcom',        group: 'Booking.com',name: 'Hotel URL',            icon: '🏨', tag: '@BookingcomHotelUrl Create Feed' },
  // ── Facebook ───────────────────────────────────────────────────────
  { id: 'fb_page',           group: 'Facebook',   name: 'Page',                 icon: '📘', tag: '@FacebookPage  Create Feed' },
  { id: 'fb_reviews',        group: 'Facebook',   name: 'Page Reviews',         icon: '⭐', tag: '@FacebookPageReviews Create Feed' },
  { id: 'fb_mentions',       group: 'Facebook',   name: 'Page Mentions',        icon: '💬', tag: '@FacebookPageMentions Create Feed' },
  { id: 'fb_reels',          group: 'Facebook',   name: 'Reels',                icon: '🎬', tag: '@FacebookReels Create Feed' },
  // ── Flickr ─────────────────────────────────────────────────────────
  { id: 'flickr_hashtag',    group: 'Flickr',     name: 'Hashtag',              icon: '#️⃣', tag: '@FlickrHashtag create Feed' },
  { id: 'flickr_handle',     group: 'Flickr',     name: 'Handle',               icon: '🔗', tag: '@FlickrHandle create Feed' },
  // ── Google ─────────────────────────────────────────────────────────
  { id: 'google_places',     group: 'Google',     name: 'Places',               icon: '📍', tag: '@GooglePlaces  Create Feed' },
  { id: 'google_myplaces',   group: 'Google',     name: 'My Places',            icon: '🗺️', tag: '@GoogleMyPlaces  Create Feed' },
  // ── LinkedIn ───────────────────────────────────────────────────────
  { id: 'li_company',        group: 'LinkedIn',   name: 'Company Page',         icon: '💼', tag: '@LinkedInCompanyPage  Create Feed' },
  { id: 'li_posturl',        group: 'LinkedIn',   name: 'Post URL',             icon: '🔗', tag: '@LinkedInPostUrl  Create Feed' },
  // ── Pinterest ──────────────────────────────────────────────────────
  { id: 'pin_handle',        group: 'Pinterest',  name: 'Handle',               icon: '📌', tag: '@PinterestHandle  Create Feed' },
  { id: 'pin_board',         group: 'Pinterest',  name: 'User Board',           icon: '🗂️', tag: '@PinterestUserBoard  Create Feed' },
  // ── Reddit ─────────────────────────────────────────────────────────
  { id: 'reddit_community',  group: 'Reddit',     name: 'Community',            icon: '👥', tag: '@RedditCommunity Create Feed' },
  { id: 'reddit_handle',     group: 'Reddit',     name: 'Handle',               icon: '🔗', tag: '@RedditHandle Create Feed' },
  { id: 'reddit_keyword',    group: 'Reddit',     name: 'Keyword',              icon: '🔍', tag: '@RedditKeyword Create Feed' },
  // ── Request Network ────────────────────────────────────────────────
  { id: 'requestnetwork',    group: 'Request Network', name: 'Request Network', icon: '🌐', tag: '@RequestNetwork  Create Feed' },
  // ── ReviewHub ──────────────────────────────────────────────────────
  { id: 'reviewhub',         group: 'ReviewHub',  name: 'Review Hub',           icon: '⭐', tag: '@ReviewHub Create Feed' },
  { id: 'reviewhub_form',    group: 'ReviewHub',  name: 'Fill Review Form',     icon: '📝', tag: '@FillReviewForm Create Feed' },
  { id: 'reviewhub_snap',    group: 'ReviewHub',  name: 'Verify SnapUp Feed',   icon: '✅', tag: '@VerifySnapUpFeed Create Feed' },
  // ── RSS ────────────────────────────────────────────────────────────
  { id: 'rss',               group: 'RSS',        name: 'RSS Feed',             icon: '📡', tag: '@Rss  Create Feed' },
  // ── Slack ──────────────────────────────────────────────────────────
  { id: 'slack',             group: 'Slack',      name: 'Channel Keyword',      icon: '💬', tag: '@SlackChannelKeyword Create Feed' },
  // ── TikTok ─────────────────────────────────────────────────────────
  { id: 'tt_hashtag',        group: 'TikTok',     name: 'Hashtag',              icon: '#️⃣', tag: '@TikTokHashtag  Create Feed' },
  { id: 'tt_handle',         group: 'TikTok',     name: 'Handle',               icon: '🔗', tag: '@TikTokHandle  Create Feed' },
  { id: 'tt_myhandle',       group: 'TikTok',     name: 'My Handle',            icon: '👤', tag: '@TikTokMyHandle  Create Feed' },
  { id: 'tt_posturl',        group: 'TikTok',     name: 'Post URL',             icon: '🎵', tag: '@TikTokPostUrl  Create Feed' },
  // ── Tripadvisor ────────────────────────────────────────────────────
  { id: 'ta_restaurant',     group: 'Tripadvisor',name: 'Restaurant',           icon: '🍽️', tag: '@TripadvisorRestaurant  Create Feed' },
  { id: 'ta_hotel',          group: 'Tripadvisor',name: 'Hotel',                icon: '🏨', tag: '@TripadvisorHotel  Create Feed' },
  // ── Tumblr ─────────────────────────────────────────────────────────
  { id: 'tumblr_hashtag',    group: 'Tumblr',     name: 'Hashtag',              icon: '#️⃣', tag: '@TumblrHashtag  Create Feed' },
  { id: 'tumblr_handle',     group: 'Tumblr',     name: 'Handle',               icon: '🔗', tag: '@TumblrHandle  Create Feed' },
  // ── Upload ─────────────────────────────────────────────────────────
  { id: 'up_tiktok',         group: 'Upload',     name: 'TikTok Personal',      icon: '🎵', tag: '@TiktokPersonal  Create Feed' },
  { id: 'up_igposturl',      group: 'Upload',     name: 'Instagram Post URL',   icon: '📸', tag: '@InstagramPostUrl  Create Feed' },
  { id: 'up_manual',         group: 'Upload',     name: 'Manual Upload',        icon: '⬆️', tag: '@ManualUpload  Create Feed' },
  // ── Vimeo ──────────────────────────────────────────────────────────
  { id: 'vimeo_hashtag',     group: 'Vimeo',      name: 'Hashtag',              icon: '#️⃣', tag: '@VimeoHashtag  Create Feed' },
  { id: 'vimeo_handle',      group: 'Vimeo',      name: 'Handle',               icon: '🔗', tag: '@VimeoHandle  Create Feed' },
  // ── Yelp ───────────────────────────────────────────────────────────
  { id: 'yelp_bizpage',      group: 'Yelp',       name: 'Business Page',        icon: '⭐', tag: '@YelpBusinessPage  Create Feed' },
  { id: 'yelp_bizname',      group: 'Yelp',       name: 'Business Name',        icon: '🏪', tag: '@YelpBusinessName  Create Feed' },
  // ── YouTube ────────────────────────────────────────────────────────
  { id: 'yt_channelurl',     group: 'YouTube',    name: 'Channel URL',          icon: '▶️', tag: '@YoutubeChannelUrl  Create Feed' },
  { id: 'yt_shorts',         group: 'YouTube',    name: 'Shorts',               icon: '🎬', tag: '@YoutbeShorts  Create Feed' },
  { id: 'yt_playlist',       group: 'YouTube',    name: 'Playlist',             icon: '🎵', tag: '@YoutubePlaylist  Create Feed' },
  { id: 'yt_keywords',       group: 'YouTube',    name: 'Keywords',             icon: '🔍', tag: '@YoutubeKeywords  Create Feed' },
  { id: 'yt_location',       group: 'YouTube',    name: 'Location',             icon: '📍', tag: '@YoutubeLocation  Create Feed' },
];

// ─── State ───────────────────────────────────────────────────────────────────
const state = {}; // id -> 'idle' | 'running' | 'passed' | 'failed' | 'skipped'
TESTS.forEach(t => state[t.id] = 'idle');

let stats = { pass: 0, fail: 0, running: 0 };

// ─── Render test list with group headers ─────────────────────────────────────
function renderList() {
  const container = document.getElementById('test-list');
  const badgeMap = {
    idle:    ['badge-idle', 'IDLE'],
    running: ['badge-running', '● RUN'],
    passed:  ['badge-passed', '✓ PASS'],
    failed:  ['badge-failed', '✗ FAIL'],
    skipped: ['badge-skipped', '⟳ SKIP'],
  };

  // Group tests
  const groups = {};
  TESTS.forEach(t => {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });

  let html = '';
  for (const [group, tests] of Object.entries(groups)) {
    const ids = tests.map(t => `'${t.id}'`).join(',');
    html += `<div class="group-header">
      <span>${group}</span>
      <button class="run-group-btn" onclick="runGroup([${ids}])">▶ Run All</button>
    </div>`;
    html += tests.map(t => {
      const s = state[t.id];
      const [cls, label] = badgeMap[s] || badgeMap.idle;
      return `
        <div class="test-card ${s === 'running' ? 'running' : s === 'passed' ? 'passed' : s === 'failed' ? 'failed' : ''}"
             id="card-${t.id}" onclick="runTest('${t.id}')">
          <div class="test-icon">${t.icon}</div>
          <div class="test-info">
            <div class="test-name">${t.name}</div>
            <div class="test-tag">${t.tag}</div>
          </div>
          <div class="test-badge ${cls}">${label}</div>
        </div>`;
    }).join('');
  }
  container.innerHTML = html;
}

function updateStats() {
  stats.pass    = TESTS.filter(t => state[t.id] === 'passed').length;
  stats.fail    = TESTS.filter(t => state[t.id] === 'failed').length;
  stats.running = TESTS.filter(t => state[t.id] === 'running').length;
  document.getElementById('st-pass').textContent = stats.pass;
  document.getElementById('st-fail').textContent = stats.fail;
  document.getElementById('st-run').textContent  = stats.running;
}

// ─── Terminal helpers ────────────────────────────────────────────────────────
function writeLine(text, cls = '') {
  const t = document.getElementById('terminal');
  // Remove placeholder if present
  const ph = t.querySelector('.terminal-placeholder');
  if (ph) ph.remove();

  const span = document.createElement('span');
  span.className = 'line ' + cls;
  span.textContent = text;
  t.appendChild(span);
  t.scrollTop = t.scrollHeight;
}

function clearOutput() {
  document.getElementById('terminal').innerHTML = `
    <div class="terminal-placeholder">
      <span class="big">🎯</span>
      Terminal cleared. Click a test to run it.
    </div>`;
  document.getElementById('output-title').textContent = 'Terminal Output';
}

function colorize(text) {
  if (/passed|✓|√|PASS/.test(text))  return 'line-pass';
  if (/failed|✗|FAIL|Error/.test(text)) return 'line-fail';
  if (/warning|WARN|skip/i.test(text)) return 'line-warn';
  if (/^\s*(Running|Test|Spec|describe)/i.test(text)) return 'line-info';
  if (/^[\s>]+$/.test(text) || text.trim() === '') return 'line-dim';
  if (/✅|▶|🧹/.test(text)) return 'line-bold';
  return '';
}

// ─── Run a single test ───────────────────────────────────────────────────────
let runningId = null;

async function runTest(id) {
  if (runningId) {
    writeLine('⚠ A test is already running. Please wait.', 'line-warn');
    return;
  }

  const test = TESTS.find(t => t.id === id);
  if (!test) return;

  state[id] = 'running';
  runningId = id;
  renderList();
  updateStats();

  document.getElementById('output-title').innerHTML =
    `<span class="spinner"></span> Running: ${test.name}`;

  writeLine('', '');
  writeLine(`${'─'.repeat(60)}`, 'line-dim');
  writeLine(`▶  ${test.tag}`, 'line-info');
  writeLine(`${'─'.repeat(60)}`, 'line-dim');

  const startTime = Date.now();

  try {
    const res = await fetch(`${SERVER}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag: test.tag }),
    });

    if (!res.body) throw new Error('No response body (streaming not supported)');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      full += chunk;
      chunk.split('\n').forEach(line => {
        if (line !== undefined) writeLine(line, colorize(line));
      });
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const passed = /passed/i.test(full) || /✓/.test(full) || /Exited with code 0/.test(full);
    const failed = /failed/i.test(full) || /✗/.test(full) || /Exited with code [^0]/.test(full);
    const skipped = /skipped|skip/i.test(full) && !passed;

    state[id] = passed ? 'passed' : failed ? 'failed' : skipped ? 'skipped' : 'passed';
    document.getElementById('st-time').textContent = `Last run: ${elapsed}s`;

  } catch (err) {
    writeLine('', '');
    writeLine('❌ Could not connect to run-tests.js server.', 'line-fail');
    writeLine(`   Error: ${err.message}`, 'line-dim');
    writeLine('', '');
    writeLine('   Make sure you have started the server:', 'line-warn');
    writeLine('   → Open a terminal in your project folder', 'line-dim');
    writeLine('   → Run:  node run-tests.js', 'line-info');
    state[id] = 'failed';
  }

  runningId = null;
  renderList();
  updateStats();
  document.getElementById('output-title').textContent = `Done: ${test.name}`;
}

// ─── Run a group of tests sequentially ───────────────────────────────────────
async function runGroup(ids) {
  if (runningId) { writeLine('⚠ A test is already running. Please wait.', 'line-warn'); return; }
  clearOutput();
  writeLine(`🚀 Running ${ids.length} tests in group…`, 'line-info');
  for (const id of ids) {
    await runTest(id);
    await new Promise(r => setTimeout(r, 500));
  }
  writeLine('\n🏁 Group complete.', 'line-bold');
}

// ─── Run all tests sequentially ──────────────────────────────────────────────
async function runAll() {
  const btn = document.getElementById('run-all-btn');
  btn.disabled = true;
  clearOutput();
  writeLine('🚀 Running all Instagram tests sequentially…', 'line-info');
  writeLine('', '');

  for (const t of TESTS) {
    await runTest(t.id);
    await new Promise(r => setTimeout(r, 800)); // brief pause between tests
  }

  writeLine('', '');
  writeLine('🏁 All tests complete.', 'line-bold');
  btn.disabled = false;
}

// ─── Server health check ─────────────────────────────────────────────────────
async function checkServer() {
  try {
    const res = await fetch(`${SERVER}/ping`, { signal: AbortSignal.timeout(2000) });
    const ok = res.ok && (await res.text()) === 'pong';
    document.getElementById('dot').className = 'dot ' + (ok ? 'online' : 'offline');
    document.getElementById('server-label').textContent = ok ? 'Server online' : 'Server error';
  } catch {
    document.getElementById('dot').className = 'dot offline';
    document.getElementById('server-label').textContent = 'Server offline';
  }
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderList();
checkServer();
setInterval(checkServer, 5000);
</script>
